<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA Protocol - Ambiente de Execução Live</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000; /* Dark background before code loads */
            color: #00ff41;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #output {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .overlay {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            display: flex;
            gap: 10px;
            opacity: 0.1;
            transition: opacity 0.5s;
        }

        .overlay:hover {
            opacity: 1;
        }

        .btn {
            background: rgba(37, 37, 38, 0.8);
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #00ff41;
            color: #000;
        }

        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            font-size: 10px;
            font-family: monospace;
            border-top: 1px solid #1a1a1b;
            z-index: 9998;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .glitch {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            animation: glitch 1s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: -2px 0 #ff00c1, 2px 2px #ff00c1; }
            25% { text-shadow: 2px 0 #ff00c1, -1px -1px #ff00c1; }
            50% { text-shadow: -1px 2px #ff00c1, 1px -2px #ff00c1; }
            75% { text-shadow: 1px -1px #ff00c1, 2px 1px #ff00c1; }
            100% { text-shadow: -2px -2px #ff00c1, -1px 2px #ff00c1; }
        }
    </style>
</head>
<body>

    <div class="overlay">
        <button class="btn" onclick="location.reload()">Reset</button>
        <button class="btn" onclick="window.close()">Terminal</button>
    </div>

    <div id="loader" class="loader">
        <div class="glitch">DECRYPTING...</div>
        <p style="margin-top: 20px; font-size: 12px; color: #888;">INJETANDO PROTOCOLO OPA NA MEMÓRIA</p>
    </div>

    <iframe id="output"></iframe>

    <div class="status-bar" id="statusBar">ESTADO: AGUARDANDO_DADOS</div>

    <script src="opa_core.js"></script>
    <script>
        const statusBar = document.getElementById('statusBar');
        const loader = document.getElementById('loader');
        const iframe = document.getElementById('output');

        function setStatus(text) {
            statusBar.textContent = "ESTADO: " + text.toUpperCase();
        }

        window.onload = function() {
            // Priority: URL Hash (more reliable on file://), then localStorage
            let encoded = window.location.hash.substring(1);
            if (encoded) {
                encoded = decodeURIComponent(encoded);
            } else {
                encoded = localStorage.getItem('opa_code_payload');
            }

            if (!encoded) {
                loader.innerHTML = "<div class='glitch' style='color: red'>ERRO_DADOS</div><p>Nenhum payload OPA encontrado no buffer.</p>";
                setStatus("ERRO_BUFFER_VAZIO");
                return;
            }

            try {
                setStatus("DESCRIPTOGRAFANDO_PAYLOAD");
                const decoded = decodificar(encoded);
                
                setStatus("RECONSTRUINDO_DADOS");
                
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Writing code directy to iframe creates a "common page" context
                // where all HTML, CSS and JS are executed as standard.
                doc.open();
                doc.write(decoded);
                doc.close();

                setStatus("LIMPEZA_DE_CACHE");

                // Seamless transition to the executed page
                setTimeout(() => {
                    loader.style.display = 'none';
                    iframe.style.display = 'block';
                    setStatus("EXECUÇÃO_CONCLUÍDA");
                    setTimeout(() => statusBar.style.display = 'none', 3000);
                }, 1500);

            } catch (err) {
                console.error(err);
                loader.innerHTML = "<div class='glitch' style='color: red'>ERRO_OPA</div><p>" + err.message + "</p>";
                setStatus("ERRO_PROTOCOLO");
            }
        };
    </script>
</body>
</html>
