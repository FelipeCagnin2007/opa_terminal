<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA SYSTEM TERMINAL v15.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>OPA SYSTEM TERMINAL</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tradutor')">Tradutor</button>
            <button class="tab-btn" onclick="switchTab('referencia')">Guia de Referência</button>
            <button class="tab-btn" onclick="switchTab('executor')">Executor de Código</button>
            <button class="tab-btn" onclick="switchTab('quest')" id="btnQuest">OPA-gotchi</button>
        </div>

        <!-- Tab 1: Tradutor -->
        <div id="tradutor" class="tab-content active">
            <div class="io-group">
                <div class="field">
                    <label>Linguagem Humana</label>
                    <textarea id="inNormal" placeholder="Digite seu texto ou código HTML/CSS/JS aqui..."></textarea>
                    <div class="actions">
                        <button class="btn btn-clear" onclick="limpar()">Limpar Tudo</button>
                    </div>
                </div>
                <div class="field">
                    <label>Linguagem OPA</label>
                    <textarea id="inOpa" placeholder="O código OPA aparecerá aqui..."></textarea>
                    <div class="actions">
                        <button class="btn" onclick="copiarOpa('inOpa')">Copiar OPA</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Referência -->
        <div id="referencia" class="tab-content">
            <div class="ref-grid" id="tabelaRef"></div>
        </div>

        <!-- Tab 3: Executor -->
        <div id="executor" class="tab-content">
            <div class="executor-area">
                <label>Terminal de Operações OPA</label>
                <textarea id="inExecutor" placeholder="Cole o código OPA aqui para execução..."></textarea>
                <button class="btn btn-large" onclick="executarOpa()">EXECUTAR PROTOCOLO</button>
            </div>
        </div>

        <!-- Tab 4: OPA-gotchi -->
        <div id="quest" class="tab-content">
            <div class="pet-area">
                <div class="pet-stats">
                    <div class="stat-item">
                        <span class="stat-label">Energia de Dados</span>
                        <div class="stat-bar"><div class="bar-fill fill-energy" id="barEnergy"></div></div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Eficiência de Humor</span>
                        <div class="stat-bar"><div class="bar-fill fill-mood" id="barMood"></div></div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Integridade do Buffer</span>
                        <div class="stat-bar"><div class="bar-fill fill-stability" id="barStability"></div></div>
                    </div>
                </div>
                
                <div class="pet-display">
                    <div class="thought-bubble" id="thoughtBubble">...</div>
                    <div class="pet-ascii" id="petCanvas">
                        <!-- ASCII Entity -->
                    </div>
                </div>

                <div class="pet-controls">
                    <button class="btn btn-pet" onclick="petAction('feed')">Alimentar (Data)</button>
                    <button class="btn btn-pet" onclick="petAction('play')">Optimizar (Play)</button>
                    <button class="btn btn-pet" onclick="petAction('patch')">Defragmentar (Fix)</button>
                    <button class="btn btn-pet" onclick="petAction('sleep')">Modo Sleep</button>
                </div>
                
                <div style="text-align: center; color: #555; font-size: 0.7rem; margin-top: 10px;">
                    ESTÁGIO: <b id="statStage">EGG</b> | IDADE: <b id="statAge">0</b> ciclos
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Copiado com sucesso!</div>

    <script src="opa_core.js"></script>
    <script src="script.js"></script>
    <script src="game.js"></script>
</body>

</html>
