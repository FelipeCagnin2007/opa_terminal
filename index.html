<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA Protocol v8.0 - Professional</title>
    <style>
        :root {
            --glow: #00ff41;
            --bg: #050806;
            --surface: #121212;
            --text: #00ff41;
            --danger: #ff3e3e;
            --accent: #008f11;
        }

        body { 
            font-family: 'Segoe UI', 'Courier New', monospace; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px;
            margin: 0;
        }

        .container { 
            background: var(--surface); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid rgba(0, 255, 65, 0.3); 
            width: 100%; 
            max-width: 950px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h1 { 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin: 10px 0 25px 0;
            font-size: 1.5rem;
            text-shadow: 0 0 15px var(--glow);
        }

        .io-group { 
            display: flex;
            flex-direction: column;
            gap: 20px; 
        }

        @media (min-width: 768px) {
            .io-group { display: grid; grid-template-columns: 1fr 1fr; }
            h1 { font-size: 2.2rem; }
        }

        .field { display: flex; flex-direction: column; position: relative; }
        label { font-size: 0.7rem; margin-bottom: 8px; font-weight: 800; color: var(--accent); text-transform: uppercase; }

        textarea { 
            width: 100%; 
            height: 180px; 
            background: #000; 
            border: 1px solid #222; 
            color: var(--text); 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box; 
            resize: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        textarea:focus { 
            border-color: var(--glow); 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15); 
            outline: none; 
        }

        /* Botões */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid var(--glow);
            background: transparent;
            color: var(--glow);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover { background: rgba(0, 255, 65, 0.1); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-clear { border-color: var(--danger); color: var(--danger); }
        .btn-clear:hover { background: rgba(255, 62, 62, 0.1); }

        /* Tabela Ref */
        .ref-section { 
            margin-top: 30px; 
            width: 100%; 
            max-width: 950px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 10px; 
            padding: 20px;
            border-top: 1px solid #222;
            box-sizing: border-box;
        }

        .section-title { 
            grid-column: 1 / -1; 
            color: var(--glow); 
            font-size: 0.9rem; 
            margin: 20px 0 10px 0; 
            text-transform: uppercase; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after { content: ""; height: 1px; background: #222; flex-grow: 1; }

        .ref-card { 
            background: #0a0a0a; 
            padding: 10px; 
            border: 1px solid #1a1a1a; 
            font-size: 0.75rem; 
            border-radius: 6px;
            transition: border 0.3s;
        }
        .ref-card:hover { border-color: var(--accent); }
        .ref-card b { color: #fff; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .ref-card span { color: var(--accent); font-family: monospace; word-break: break-all; }

        .toast {
            position: fixed; bottom: 20px; background: var(--glow); color: #000;
            padding: 10px 20px; border-radius: 50px; font-weight: bold;
            display: none; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>OPA SYSTEM TERMINAL</h1>
    
    <div class="io-group">
        <div class="field">
            <label>Mensagem Humana</label>
            <textarea id="inNormal" placeholder="Digite seu texto aqui..."></textarea>
            <div class="actions">
                <button class="btn btn-clear" onclick="limpar()">Limpar Tudo</button>
            </div>
        </div>
        <div class="field">
            <label>Código OPA</label>
            <textarea id="inOpa" placeholder="Código criptografado..."></textarea>
            <div class="actions">
                <button class="btn" onclick="copiarOpa()">Copiar OPA</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">Copiado com sucesso!</div>

<div class="ref-section" id="tabelaRef">
    <!-- Gerado via JS -->
</div>

<script>
    const alfabeto = "abcdefghijklmnopqrstuvwxyz";
    const acentosBase = { 'á':'a', 'à':'a', 'ã':'a', 'â':'a', 'é':'e', 'ê':'e', 'í':'i', 'ó':'o', 'ô':'o', 'õ':'o', 'ú':'u' };
    const extraParaAcento = {
        'a': {1:'á', 2:'à', 3:'ã', 4:'â'},
        'e': {1:'é', 2:'ê'},
        'i': {1:'í'},
        'o': {1:'ó', 2:'ô', 3:'õ'},
        'u': {1:'ú'}
    };
    const pontuacao = {'.': 2, ',': 3, '?': 4, '!': 5, ';': 6, ':': 7, '-': 8};

    const areaNormal = document.getElementById('inNormal');
    const areaOpa = document.getElementById('inOpa');

    function codificar(texto) {
        return texto.toLowerCase().split('').map(char => {
            if (char === ' ') return '/';
            if (char === '\n') return '\n';
            if (pontuacao[char]) return "op" + "a".repeat(pontuacao[char]);
            let base = acentosBase[char] || char;
            let i = alfabeto.indexOf(base);
            if (i === -1) return char;
            let o, p;
            if (i < 9) { o = 1; p = i + 2; }
            else if (i < 19) { o = 2; p = i - 8; }
            else { o = 3; p = i - 18; }
            let res = "o".repeat(o) + "p".repeat(p) + "a";
            if (acentosBase[char]) {
                for (let n in extraParaAcento[base]) {
                    if (extraParaAcento[base][n] === char) { res += "a".repeat(parseInt(n)); break; }
                }
            }
            return res;
        }).join(' ');
    }

    function decodificar(textoOpa) {
        return textoOpa.trim().split(/\s+/).map(t => {
            if (t === '/') return ' ';
            if (t === '\n') return '\n';
            if (t.startsWith('op') && !t.includes('oo') && !t.includes('pp')) {
                let as = (t.match(/a/g) || []).length;
                for (let p in pontuacao) if (pontuacao[p] === as) return p;
            }
            const o = (t.match(/o/g) || []).length;
            const p = (t.match(/p/g) || []).length;
            const a = (t.match(/a/g) || []).length;
            let i = (o === 1) ? p - 2 : (o === 2) ? p + 8 : (o === 3) ? p + 18 : -1;
            let l = alfabeto[i] || t;
            if (a > 1 && extraParaAcento[l]) {
                let ex = a - 1;
                if (extraParaAcento[l][ex]) return extraParaAcento[l][ex];
            }
            return l;
        }).join('');
    }

    areaNormal.oninput = () => { areaOpa.value = codificar(areaNormal.value); };
    areaOpa.oninput = () => { areaNormal.value = decodificar(areaOpa.value); };

    function limpar() {
        areaNormal.value = "";
        areaOpa.value = "";
    }

    function copiarOpa() {
        areaOpa.select();
        document.execCommand("copy");
        const toast = document.getElementById('toast');
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2000);
    }

    function popularTabela() {
        let h = '<div class="section-title">Alfabeto Base</div>';
        alfabeto.split('').forEach(l => {
            h += `<div class="ref-card"><b>${l.toUpperCase()}</b><span>${codificar(l)}</span></div>`;
        });
        h += '<div class="section-title">Acentuação</div>';
        for (let b in extraParaAcento) {
            for (let n in extraParaAcento[b]) {
                let c = extraParaAcento[b][n];
                h += `<div class="ref-card"><b>${c.toUpperCase()}</b><span>${codificar(c)}</span></div>`;
            }
        }
        h += '<div class="section-title">Pontuação</div>';
        for (let p in pontuacao) {
            h += `<div class="ref-card"><b>[ ${p} ]</b><span>${codificar(p)}</span></div>`;
        }
        document.getElementById('tabelaRef').innerHTML = h;
    }
    popularTabela();
</script>

</body>
</html>
