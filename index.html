<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA SYSTEM TERMINAL v12.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>OPA SYSTEM TERMINAL</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tradutor')">Tradutor</button>
            <button class="tab-btn" onclick="switchTab('referencia')">Guia de Referência</button>
            <button class="tab-btn" onclick="switchTab('executor')">Executor de Código</button>
        </div>

        <!-- Tab 1: Tradutor -->
        <div id="tradutor" class="tab-content active">
            <div class="io-group">
                <div class="field">
                    <label>Linguagem Humana</label>
                    <textarea id="inNormal" placeholder="Digite seu texto aqui..."></textarea>
                    <div class="actions">
                        <button class="btn btn-clear" onclick="limpar()">Limpar Tudo</button>
                    </div>
                </div>
                <div class="field">
                    <label>Linguagem OPA</label>
                    <textarea id="inOpa" placeholder="O código OPA aparecerá aqui..."></textarea>
                    <div class="actions">
                        <button class="btn" onclick="copiarOpa('inOpa')">Copiar OPA</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Referência -->
        <div id="referencia" class="tab-content">
            <div class="ref-grid" id="tabelaRef">
                <!-- Populada via JS -->
            </div>
        </div>

        <!-- Tab 3: Executor -->
        <div id="executor" class="tab-content">
            <div class="executor-area">
                <label>Terminal de Operações OPA</label>
                <textarea id="inExecutor" placeholder="Cole o código OPA aqui para execução..."></textarea>
                <button class="btn btn-large" onclick="executarOpa()">EXECUTAR PROTOCOLO</button>
            </div>
        </div>

    </div>

    <div id="toast" class="toast">Copiado com sucesso!</div>

    <script src="opa_core.js"></script>
    <script src="script.js"></script>
</body>

</html>
